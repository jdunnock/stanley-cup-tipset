<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lagen</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        background: linear-gradient(180deg, #f0fbf4 0%, #e2f3ec 100%);
        color: #102a18;
      }

      .page {
        max-width: 1400px;
        margin: 0 auto;
        padding: 28px 20px 36px;
      }

      .top-nav {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .top-nav a {
        text-decoration: none;
        border: 1px solid #b8ddc6;
        padding: 6px 10px;
        border-radius: 6px;
        color: #172c22;
        font-size: 14px;
      }

      .top-nav a.active {
        background: #172c22;
        color: #fff;
        border-color: #172c22;
        font-weight: 600;
      }

      .top-nav a.admin-link {
        display: inline-flex;
      }

      .hero {
        background: #ffffff;
        border-radius: 14px;
        border: 1px solid #c0dece;
        padding: 18px 20px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .meta {
        margin-top: 12px;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        font-size: 13px;
        color: #354d38;
      }

      .hidden {
        display: none;
      }

      #status {
        margin: 0;
        font-size: 13px;
      }

      .table-wrap {
        border-radius: 14px;
        overflow: auto;
        border: 1px solid #c0dece;
        background: #fff;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        min-width: 980px;
      }

      thead tr:first-child th {
        background: #152d20;
        color: #fff;
        border-bottom: 1px solid #28472e;
        font-size: 13px;
        letter-spacing: 0.02em;
      }

      thead tr:nth-child(2) th {
        background: #e2f4ec;
        color: #192e22;
        font-size: 12px;
      }

      th,
      td {
        border: 1px solid #c8eada;
        padding: 9px 10px;
        text-align: left;
        font-size: 13px;
        vertical-align: middle;
      }

      td.points {
        width: 82px;
        text-align: right;
        font-weight: 600;
      }

      td.player {
        min-width: 170px;
      }

      td.empty {
        color: #769378;
      }

      td.not-found {
        background: #fff4f4;
      }

      tr.total-row td {
        font-weight: 700;
        background: #ebf6f0;
      }

      .mobile-cards {
        display: none;
      }

      @media (max-width: 900px) {
        .page {
          padding: 16px 12px 24px;
        }

        .top-nav a.admin-link {
          display: none;
        }

        .table-wrap {
          display: none;
        }

        .mobile-cards {
          display: flex;
          gap: 12px;
          overflow-x: auto;
          scroll-snap-type: x mandatory;
          padding-bottom: 6px;
          -webkit-overflow-scrolling: touch;
        }

        .participant-card {
          scroll-snap-align: start;
          flex: 0 0 86%;
          background: #fff;
          border: 1px solid #c0dece;
          border-radius: 14px;
          padding: 12px;
        }

        .participant-card h2 {
          margin: 0 0 8px;
          font-size: 18px;
        }

        .card-section {
          margin-top: 10px;
        }

        .card-section-title {
          margin: 0 0 6px;
          font-size: 12px;
          letter-spacing: 0.04em;
          text-transform: uppercase;
          color: #3a5e3e;
          font-weight: 700;
        }

        .card-row {
          display: flex;
          justify-content: space-between;
          gap: 10px;
          padding: 6px 0;
          border-bottom: 1px solid #d5ece0;
          font-size: 13px;
        }

        .card-row:last-child {
          border-bottom: none;
        }

        .card-player {
          color: #172c22;
        }

        .card-points {
          font-weight: 700;
          min-width: 36px;
          text-align: right;
        }

        .card-total {
          margin-top: 10px;
          padding-top: 10px;
          border-top: 2px solid #c0dece;
          display: flex;
          justify-content: space-between;
          font-weight: 700;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <nav class="top-nav" aria-label="Päänavigaatio">
        <a href="/stallning.html">Ställningen</a>
        <a href="/" class="active">Lagen</a>
        <a href="/playoffs.html">Playoffs</a>
        <a href="/nyheter.html">Nyheter</a>
        <a href="/admin.html" class="admin-link">Admin</a>
      </nav>

      <section class="hero">
        <h1>Lagen</h1>
        <div class="meta hidden">
          <div id="status"></div>
          <div id="summaryMeta"></div>
        </div>
      </section>

      <div class="table-wrap">
        <table>
          <thead id="head"></thead>
          <tbody id="body"></tbody>
        </table>
      </div>

      <div id="mobileCards" class="mobile-cards" aria-label="Deltagarkort"></div>
    </div>

    <script type="module" src="/tipsen.js"></script>
  </body>
</html>
