<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validator | Stanley Cup Tipset</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <nav class="top-nav">
        <a href="/index.html">Hem</a>
        <a href="/lagen.html">Lagen</a>
        <a href="/stallning.html">Stallningen</a>
        <a href="/nyheter.html">Nyheter</a>
        <a class="active" href="/validator.html">Validator</a>
      </nav>

      <section class="hero">
        <div class="hero-head">
          <h1>Playoff Validator</h1>
          <p id="status" class="meta-chip"></p>
        </div>
      </section>

      <section class="card stack">
        <div class="grid-two">
          <label>
            Admin token
            <input id="adminToken" type="password" placeholder="x-admin-token" autocomplete="off" />
          </label>
          <label>
            Deltagare
            <input id="participantName" placeholder="Esim. Jarmo" />
          </label>
          <label>
            Tiedosto
            <select id="fileSelect"></select>
          </label>
        </div>

        <label>
          Roster (1 pelaaja / rivi)
          <textarea id="rosterText" placeholder="McDavid (EDM)\nAho (CAR)\nMakar (COL)"></textarea>
        </label>

        <div>
          <button id="validateBtn" type="button">Aja validointi</button>
          <span id="decision" class="meta-chip" style="margin-left: 8px">-</span>
        </div>

        <div class="grid-two">
          <article class="card">
            <h2>Errors</h2>
            <ul id="errorsList"></ul>
          </article>
          <article class="card">
            <h2>Warnings</h2>
            <ul id="warningsList"></ul>
          </article>
        </div>

        <article class="card">
          <h2>Diagnostics</h2>
          <pre id="diagnostics">-</pre>
        </article>
      </section>
    </main>
    <script src="/validator.js" type="module"></script>
  </body>
</html>
