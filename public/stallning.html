<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ställningen</title>
    <style>
      :root {
        color-scheme: light;
        --surface-border: #d5e1f3;
        --text-strong: #102239;
        --text-muted: #48617f;
        --points-positive: #0f6a44;
        --points-negative: #a33a3a;
        --points-neutral: #14355e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        background: radial-gradient(circle at top, #f5f8ff 0%, #edf2fa 45%, #e8eef8 100%);
        color: var(--text-strong);
      }

      .page {
        max-width: 1420px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }

      .top-nav {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }

      .top-nav a {
        text-decoration: none;
        border: 1px solid #cfdaea;
        padding: 7px 12px;
        border-radius: 999px;
        color: #1a314e;
        font-size: 13px;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.72);
      }

      .top-nav a.active {
        background: linear-gradient(135deg, #112a49 0%, #1a3b66 100%);
        color: #fff;
        border-color: #173559;
      }

      .top-nav a.admin-link {
        display: inline-flex;
      }

      .hero {
        background: linear-gradient(145deg, #ffffff 0%, #f7faff 100%);
        border-radius: 18px;
        border: 1px solid var(--surface-border);
        padding: 20px 22px;
        margin-bottom: 16px;
      }

      .hero-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        letter-spacing: -0.02em;
      }

      .meta {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .meta-chip {
        border: 1px solid #dbe6f5;
        background: #f5f8fd;
        color: var(--text-muted);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
      }

      #status {
        margin: 0;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .section-title {
        margin: 4px 2px 8px;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #27466f;
      }

      .list-wrap {
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid var(--surface-border);
        background: rgba(255, 255, 255, 0.94);
      }

      .row {
        display: grid;
        grid-template-columns: 72px 1fr 96px;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid #e2e9f5;
      }

      .row.total {
        grid-template-columns: 72px 1fr 88px 88px 104px;
      }

      .row.total.header > div:nth-child(n + 3) {
        justify-self: end;
        text-align: right;
      }

      .row:last-child {
        border-bottom: none;
      }

      .row.winner-row {
        background: linear-gradient(90deg, #fff9db 0%, #ffffff 65%);
      }

      .row.header {
        background: linear-gradient(135deg, #142d4f 0%, #1b436f 100%);
        color: #fff;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .rank {
        font-weight: 800;
        color: #16345d;
        font-variant-numeric: tabular-nums;
      }

      .name {
        font-weight: 700;
        color: #102239;
      }

      .name.winner-name {
        font-weight: 900;
        color: #6f4f00;
        letter-spacing: 0.01em;
      }

      .points {
        justify-self: end;
        font-weight: 800;
        color: var(--points-neutral);
        font-variant-numeric: tabular-nums;
      }

      .points.points-positive {
        color: var(--points-positive);
      }

      .points.points-negative {
        color: var(--points-negative);
      }

      .points.points-neutral {
        color: var(--points-neutral);
      }

      @media (max-width: 900px) {
        .page {
          padding: 14px 12px 26px;
        }

        .top-nav a.admin-link {
          display: none;
        }

        .hero {
          padding: 16px;
        }

        .hero-head {
          align-items: flex-start;
          flex-direction: column;
          gap: 8px;
        }

        h1 {
          font-size: 28px;
        }

        .row {
          grid-template-columns: 52px 1fr 84px;
          padding: 12px;
          gap: 8px;
        }

        .row.total {
          grid-template-columns: 52px 1fr 64px 64px 76px;
        }
      }

      @media (max-width: 430px) {
        .page {
          padding: 12px 10px 22px;
        }

        .hero {
          border-radius: 16px;
          padding: 14px;
        }

        h1 {
          font-size: 26px;
        }

        .meta {
          gap: 6px;
          margin-top: 10px;
        }

        .meta-chip {
          font-size: 11px;
          padding: 5px 9px;
        }

        .row {
          grid-template-columns: 46px 1fr 72px;
          font-size: 13px;
          padding: 11px 10px;
        }

        .row.total {
          grid-template-columns: 40px 1fr 54px 54px 66px;
          font-size: 12px;
          gap: 6px;
        }

        .section-title {
          font-size: 12px;
          margin-top: 2px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <nav class="top-nav" aria-label="Päänavigaatio">
        <a href="/stallning.html" class="active">Ställningen</a>
        <a href="/">Lagen</a>
        <a href="/nyheter.html">Nyheter</a>
        <a href="/admin.html" class="admin-link">Admin</a>
      </nav>

      <section class="hero">
        <div class="hero-head">
          <h1>Ställningen</h1>
        </div>
        <div class="meta">
          <div id="status" class="meta-chip"></div>
        </div>
      </section>

      <div class="stack">
        <section>
          <p id="periodTitle" class="section-title">Ställning Period 3</p>
          <section id="list" class="list-wrap" aria-label="Poängställning period 2"></section>
        </section>

        <section>
          <p id="totalTitle" class="section-title">Totalställning Period 1+2+3</p>
          <section id="totalList" class="list-wrap" aria-label="Totalställning period 1 plus 2"></section>
        </section>
      </div>
    </div>

    <script type="module" src="/stallning.js"></script>
  </body>
</html>
