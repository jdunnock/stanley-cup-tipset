<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stallningen | Stanley Cup Tipset</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <nav class="top-nav">

      <section class="hero">
        <div class="hero-head">
          <h1>Stallningen</h1>
          <p id="status" class="meta-chip"></p>
        </div>
        <div class="meta">
          <span id="seasonLabel" class="meta-chip">-</span>
          <span id="periodLabel" class="meta-chip">-</span>
          <span id="updatedAt" class="meta-chip">-</span>
          <span id="staleStatus" class="meta-chip">-</span>

        </div>

      <section class="list-wrap" id="list"></section>
      <section class="card" style="margin-top: 14px">
        <label class="admin-row">
          Admin token
          <input id="adminToken" type="password" placeholder="x-admin-token" autocomplete="off" />
        </label>
        <button id="runNowBtn" type="button">Kora scheduler nu</button>
      </section>
    </main>
    <script src="/stallning.js" type="module"></script>
